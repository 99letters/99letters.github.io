<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>APPS — KINOSHITA STUDIO</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DotGothic16&display=swap" rel="stylesheet">

<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  /* ── Gruvbox DARK (constraint.systems と同一) ── */
  :root {
    --bg:          #000000;
    --bg-card:     #1d2021;  /* hard-black */
    --bg-card-h:   #282828;
    --fg:          #ebdbb2;  /* cream */
    --fg-dim:      #a89984;  /* gray */
    --fg-faint:    #504945;
    --line:        #3c3836;

    --green:  #b8bb26;
    --blue:   #83a598;
    --yellow: #d79921;
    --red:    #cc241d;
    --purple: #b16286;
    --aqua:   #8ec07c;
    --orange: #d65d0e;
  }

  html { -webkit-text-size-adjust: 100%; color-scheme: dark; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Header (top, minimal) ── */
  .head {
    padding: 16px;
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px; flex-wrap: wrap;
  }
  .brand {
    font-size: 14px;
    color: var(--fg);
  }
  .brand em {
    font-style: normal;
    color: var(--fg-dim);
  }
  .head-right {
    font-size: 14px;
    color: var(--fg-dim);
    display: flex; gap: 16px;
  }
  .head-right a {
    color: var(--purple);
    text-decoration: underline;
  }

  /* ── Grid (constraint.systems と同一) ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
    gap: 2px;
    padding: 2px;
  }

  /* ── Card ── */
  .card {
    display: flex; flex-direction: column;
    gap: 8px;
    padding: 16px;
    background: var(--bg-card);
    aspect-ratio: 1 / 1;
    color: inherit; text-decoration: none;
    transition: background .15s;
    position: relative;
  }
  .card:hover { background: var(--bg-card-h); }

  /* Title row */
  .title-row {
    display: flex; justify-content: space-between;
    align-items: baseline;
    gap: 10px;
  }
  .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--fg);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  /* LAUNCHED status dot */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(184,187,38,0.6);
    flex-shrink: 0;
  }
  .live-dot.dev { background: var(--yellow); box-shadow: 0 0 6px rgba(215,153,33,0.6); }
  .live-dot.wip { background: var(--fg-faint); box-shadow: none; }
  .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--fg-dim);
    white-space: nowrap;
  }

  /* Description (Japanese pixel font) */
  .desc {
    font-family: 'DotGothic16', 'MS Gothic', 'ヒラギノ角ゴ Pro', monospace;
    font-size: 13px;
    line-height: 1.45;
    color: var(--fg-dim);
    letter-spacing: 0.02em;
    /* pixel crisp */
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: unset;
  }

  /* Image area (grow to fill remaining) */
  .img-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .img-wrap img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
  }

  /* placeholder for no-image projects */
  .img-ph {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .img-ph-mark {
    font-size: 84px;
    color: var(--fg);
    line-height: 1;
  }
  .img-ph-label {
    position: absolute; bottom: 8px; left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* LAUNCH overlay (top-right of image area) */
  .launch {
    position: absolute;
    top: 0; right: 0;
    z-index: 3;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--fg);
    background: rgba(0,0,0,0.72);
    border: 1px solid var(--fg-faint);
    padding: 4px 8px;
    text-decoration: none;
    transition: all .15s;
    cursor: pointer;
    /* button reset */
    appearance: none;
    -webkit-appearance: none;
    line-height: 1;
  }
  .launch:hover {
    color: #000;
    background: var(--green);
    border-color: var(--green);
  }
  .launch:active { transform: scale(0.96); }

  /* ── Footer ── */
  footer {
    padding: 16px;
    font-size: 14px;
    color: var(--fg-dim);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  footer a { color: var(--purple); text-decoration: underline; }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="head">
  <div class="brand">KINOSHITA_STUDIO <em>/ apps</em></div>
  <div class="head-right">
    <a href="https://github.com/kinoshitastudio" target="_blank" rel="noopener">github ↗</a>
    <a href="/">studio ↗</a>
  </div>
</header>

<main class="grid" id="grid"></main>

<footer>
  <span>not for public distribution · internal use only</span>
  <span>2026 · kinoshita studio</span>
</footer>

<script>
const BASE = 'https://kinoshitastudio.github.io';

const PROJECTS = [
  { id:'black_mirror',      title:'Black Mirror Board',date:'2026-02', image:'assets/thumbs/blackmirror.png',                          url:'https://blackmirrorboard.github.io/bmboard/',          appUrl:'https://blackmirrorboard.github.io/bmboard/app.html', description:'描いたまま残る、ブラウザの黒板。鉛筆の触感を再現するquad-midpoint smoothing。' },
  { id:'ddd',               title:'DDD',               date:'2026-01', image:'assets/thumbs/ddd.png',                                  url:'https://dddtodo.github.io/ddd/',                       appUrl:'https://dddtodo.github.io/ddd/app.html',              description:'密度・日課・デザインの3軸でタスクを振り分けるリスト管理。HTML1枚で完結。' },
  { id:'kodoco',            title:'Kodoco',            date:'2026-04', image:'assets/thumbs/kodoco.png',          app:'app.html',   description:'今日、子どもとどこいく？滋賀＋周辺168スポットを天気・年齢・時間で1枚に絞る子連れPWA。' },
  { id:'himekuri_kondate',  title:'Himekuri Kondate',  date:'2026-04', image:'assets/thumbs/himekuri.png',        app:'app.html',   description:'週の献立を自分のリズムで。400レシピと日めくりフリック、冷蔵庫逆引き。' },
  { id:'jean_of_denim',     title:'Jean of Denim',     date:'2026-03', image:'assets/thumbs/denim.png',           app:'app.html',   description:'大人のためのデニム入門書。歴史・素材・メーカー・着こなし。' },
  { id:'kody_typography',   title:'Kody Typography',   date:'2026-02', image:'assets/thumbs/kody_typography.png', app:'app.html',   description:'方向性タイピングのポスターエディタ。文字をマウスで流し、画像はdifferenceで自動反転。' },
  { id:'bear-radar',        title:'Bear Radar',        date:'2025-11', image:'assets/thumbs/bear.png',            app:null,         description:'クマ出没情報を地図とタイムラインで可視化。近隣の気配を、そっと察知する。' },
  { id:'signal',            title:'Signal',            date:'2025-10', image:'assets/thumbs/signal.png',          app:null,         description:'その違和感、気のせいで終わらせて？日々の小さなノイズを記録し、パターンを可視化。' },
  { id:'bent',              title:'Bent',              date:'2026-01', image:null, mark:'✂',                      app:'app.html',   description:'カットだけに振り切った動画エディタ。いい部分を拾って、残りを捨てる。' },
  { id:'balance_optimizer', title:'Balance Optimizer', date:'2025-12', image:null, mark:'−',                      app:'app.html',   description:'引き算で整える意思決定の補助ツール。足すのではなく、削って磨く。' },
  { id:'kinoshita_os',      title:'Kinoshita OS',      date:'2026-04', image:'assets/thumbs/kinoshitaos.png',     url:'/', app:null,         description:'木下スタジオのポートフォリオOS。自己紹介と作品群、哲学。' },
];

function render(list) {
  const g = document.getElementById('grid');
  g.innerHTML = list.map(p => {
    const href = p.url || (BASE + '/' + p.id + '/');
    const launchUrl = p.appUrl || (p.app ? (BASE + '/' + p.id + '/' + p.app) : null);
    const launchBtn = launchUrl
      ? '<button type="button" class="launch" onclick="event.stopPropagation();event.preventDefault();window.open(\'' + launchUrl + '\',\'_blank\',\'noopener\');" title="Open app directly">LAUNCH ↗</button>'
      : '';
    const imgHtml = p.image
      ? '<img src="' + p.image + '" alt="" loading="lazy">'
      : '<div class="img-ph"><div class="img-ph-mark">' + p.mark + '</div></div><div class="img-ph-label">' + p.id + '</div>';
    return ''
      + '<a class="card" href="' + href + '" target="_blank" rel="noopener">'
      +   '<div class="title-row"><span class="title"><span class="live-dot ' + (p.status || 'live') + '" title="' + (p.status === 'dev' ? 'In Development' : p.status === 'wip' ? 'Work in Progress' : 'Launched') + '"></span>' + p.title + '</span><span class="date">' + p.date + '</span></div>'
      +   '<div class="img-wrap">'
      +     launchBtn
      +     imgHtml
      +   '</div>'
      +   '<p class="desc">' + p.description + '</p>'
      + '</a>';
  }).join('');
}

render(PROJECTS);
</script>

</body>
</html>
